name: Upstream sync PR

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Pulsih/BankPlus.git
          git fetch upstream main

      - name: Create sync branch
        run: |
          BRANCH="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          git checkout -b "$BRANCH"

      - name: Merge upstream
        run: |
          git merge --no-edit --no-ff upstream/main

      - name: Build
        run: |
          make build

      - name: Test
        run: |
          make test

      - name: Push branch
        run: |
          git push origin "$BRANCH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Sync from upstream/main" \
            --body "Automated upstream sync." \
            --base main \
            --head "$BRANCH"
